<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Log ind</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">

    <a href="index.html" class="back-btn">← Tilbage</a>

    <h1>Log ind</h1>

    <form id="loginForm">

        <label>Navn</label>
        <input type="text" id="name" name="name" required>

        <label>Adgangskode</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn">Log ind</button>
        <div id="errorMessage" style="color: red; margin-top: 10px;"></div>

    </form>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        try {
            const response = await fetch('/kino/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, password })
            });

            if (response.ok) {
                const userData = await response.json();
                localStorage.setItem('user', JSON.stringify(userData));
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = 'Forkert navn eller adgangskode';
            }
        } catch (error) {
            errorDiv.textContent = 'Der opstod en fejl. Prøv igen senere.';
            console.error('Log ind fejl:', error);
        }
    });
</script>

</body>
</html>
