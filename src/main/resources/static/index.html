<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoXP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <a href="login.html">Login</a>
    <a href="register.html">Opret bruger</a>
</div>
<div class="container">
    <h1>Current Movies at KinoXP</h1>
    <div id="movies-container"></div>
</div>
<script>
    async function loadMovies() {
        try {
            const response = await fetch('/kino/movies');
            const movies = await response.json();
            const container = document.getElementById('movies-container');
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-info">
                        <h2>${movie.title} (${movie.releaseYear})</h2>
                        <p>Genre: ${movie.genre} | Duration: ${movie.durationInMinutes} min</p>
                        <p>Age Limit: ${movie.ageLimit} | Language: ${movie.language}</p>
                    </div>
                    <button class="btn">Book Now</button>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading movies:', error);
        }
    }
    loadMovies();
</script>
</body>
</html>
