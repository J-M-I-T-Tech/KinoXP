<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoXP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar" id="navbar">
    <a href="login.html" id="loginLink">Log ind</a>
    <a href="register.html" id="registerLink">Opret bruger</a>
    <a href="#" id="logoutLink" style="display: none;">Log ud</a>
    <span id="userName" style="display: none; color: #d32f2f; margin-left: 15px;"></span>
</div>
<div class="container">
    <h1>Aktuelle film i KinoXP</h1>

    <!--Admin ekstra knapper -->
    <div id="adminPanel" style="display:none">

        <button class="btn" onclick="showCreateMovie()">Opret ny film</button>
        <button class="btn" onclick="showAllMovies()">Vis alle film</button>

    </div>

    <div id="createMovieForm" style="display:none">

        <h2>Opret ny film</h2>

        <label>Title</label>
        <input id="title">

        <label>Beskrivelse</label>
        <input id="beskrivelse">

        <label>Genre</label>
        <select id="genre">
            <option value="GYSER">Gyser</option>
            <option value="ROMANTISK">Romantisk</option>
            <option value="ACTION">Action</option>
            <option value="SCIENCE_FICTION">Science Fiction</option>
        </select>

        <label>Age Limit</label>
        <select id="ageLimit">
            <option value="ALLE">Alle</option>
            <option value="SYV_PLUS">7+</option>
            <option value="ELLEVE_PLUS">11+</option>
            <option value="FEMTEN_PLUS">15+</option>
        </select>

        <label>Language</label>
        <select id="language">
            <option value="DANSK">Dansk</option>
            <option value="ENGELSK">Engelsk</option>
        </select>

        <label>Format</label>
        <select id="format">
            <option value="FORMAT_2D">2D</option>
            <option value="FORMAT_3D">3D</option>
        </select>

        <label>Release Year</label>
        <input id="releaseYear" type="number">

        <label>Duration (minutes)</label>
        <input id="duration" type="number">

        <button class="btn" onclick="createMovie()">Opret film</button>

    </div>

    <div id="movies-container"></div>
</div>
<script>
    //det fjerner resten af siden så det kun er formen for create der vises
    function hideAll() {
        document.getElementById("createMovieForm").style.display = "none";
        document.getElementById("movies-container").style.display = "none";
    }

    function showCreateMovie() {
        hideAll();
        const form = document.getElementById("createMovieForm");

        if (form.style.display === "none") {
            form.style.display = "block";
        } else {
            form.style.display = "none";
        }
    }

    function bookMovie(movieId) {
        const user = localStorage.getItem('user');
        if (!user) {
            alert('Du skal logge ind for at booke en film!');
            window.location.href = 'login.html';
            return;
        }
        window.location.href = `booking.html?movieId=${movieId}`;
    }

    async function createMovie() {

        const user = JSON.parse(localStorage.getItem("user"));
        const adminUserId = user.userId;

        const movie = {
            title: document.getElementById("title").value,
            description: document.getElementById("beskrivelse").value,
            genre: document.getElementById("genre").value,
            ageLimit: document.getElementById("ageLimit").value,
            language: document.getElementById("language").value,
            format: document.getElementById("format").value,
            durationInMinutes: parseInt(document.getElementById("duration").value),
            releaseYear: parseInt(document.getElementById("releaseYear").value)
        };
        console.log(movie);

        try {

            const response = await fetch(`/kino/movies?userId=${adminUserId}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(movie)
            });

            if (response.ok) {

                alert("Film oprettet!");

                hideAll(); // skjuler form og film

                document.getElementById("movies-container").style.display = "block";

                loadMovies();

            }

        } catch (error) {
            console.error("Fejl ved oprettelse af film:", error);
        }
    }

    function checkUserLogin() {
        const user = localStorage.getItem('user');
        const loginLink = document.getElementById('loginLink');
        const registerLink = document.getElementById('registerLink');
        const logoutLink = document.getElementById('logoutLink');
        const userName = document.getElementById('userName');

        if (user) {
            const userData = JSON.parse(user);
            loginLink.style.display = 'none';
            registerLink.style.display = 'none';
            logoutLink.style.display = 'inline';
            userName.style.display = 'inline';
            userName.textContent = `Logget ind som: ${userData.name}`;

            //Tjekker man er logget ind som admin
            if (userData.role === "ADMIN") {
                adminPanel.style.display = "block";
            }

            logoutLink.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        }
    }

    async function loadMovies() {
        const user = JSON.parse(localStorage.getItem("user"));
        const isAdmin = user && user.role === "ADMIN";
        try {
            const response = await fetch('/kino/movies');
            const movies = await response.json();
            const container = document.getElementById('movies-container');
            function formatEnum(str) {
                if (!str) return '';
                return str.split('_')
                          .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                          .join(' ');
            }
            container.innerHTML = "";
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                <div class="movie-info">
                    <h2>${movie.title} (${movie.releaseYear})</h2>
                </div>
                <button class="btn btn-secondary" onclick="window.location.href='movie.html?movieId=${movie.movieId}'">Læs mere</button>
                <button class="btn" onclick="bookMovie(${movie.movieId})">Book Nu</button>
                ${isAdmin ? `<button class="btn" onclick="deleteMovie(${movie.movieId})">Slet film</button>` : ""}
            `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading movies:', error);
        }
    }
    async function deleteMovie(movieId) {

        const user = JSON.parse(localStorage.getItem("user"));

        const response = await fetch(`/kino/movies/${movieId}?adminUserId=${user.userId}`, {
            method: "DELETE"
        });

        if (response.ok) {
            alert("Film slettet");
            loadMovies();
        } else {
            alert("Kun admin kan slette film");
        }
    }

    checkUserLogin();
    loadMovies();
</script>
</body>
</html>
