<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoXP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar" id="navbar">
    <a href="login.html" id="loginLink">Log ind</a>
    <a href="register.html" id="registerLink">Opret bruger</a>
    <a href="#" id="logoutLink" style="display: none;">Log ud</a>
    <span id="userName" style="display: none; color: #d32f2f; margin-left: 15px;"></span>
</div>
<div class="container">
    <h1>Aktuelle film i KinoXP</h1>
    <div id="movies-container"></div>
</div>
<script>
    function checkUserLogin() {
        const user = localStorage.getItem('user');
        const loginLink = document.getElementById('loginLink');
        const registerLink = document.getElementById('registerLink');
        const logoutLink = document.getElementById('logoutLink');
        const userName = document.getElementById('userName');

        if (user) {
            const userData = JSON.parse(user);
            loginLink.style.display = 'none';
            registerLink.style.display = 'none';
            logoutLink.style.display = 'inline';
            userName.style.display = 'inline';
            userName.textContent = `Logget ind som: ${userData.name}`;

            logoutLink.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        }
    }

    async function loadMovies() {
        try {
            const response = await fetch('/kino/movies');
            const movies = await response.json();
            const container = document.getElementById('movies-container');
            function formatEnum(str) {
                if (!str) return '';
                return str.split('_')
                          .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                          .join(' ');
            }
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                <div class="movie-info">
                    <h2>${movie.title} (${movie.releaseYear})</h2>
                </div>
                <button class="btn" onclick="window.location.href='movie.html?movieId=${movie.movieId}'">Læs mere</button>
            `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading movies:', error);
        }
    }



    checkUserLogin();
    loadMovies();
</script>
</body>
</html>
