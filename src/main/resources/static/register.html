<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Opret bruger</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">

    <a href="index.html" class="back-btn">← Tilbage</a>

    <h1>Opret bruger</h1>

    <form id="registerForm">

        <label>Navn</label>
        <input type="text" id="name" name="name" required>

        <label>Fødselsdato</label>
        <input type="date" id="dateOfBirth" name="dateOfBirth" required>

        <label>Rolle</label>
        <select id="role" name="role">
            <option value="CUSTOMER">Kunde</option>
            <option value="EMPLOYEE">Medarbejder</option>
            <option value="ADMIN">Administrator</option>
        </select>

        <label>Adgangskode</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn">Opret bruger</button>
        <div id="errorMessage" style="color: red; margin-top: 10px;"></div>

    </form>

</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const dateOfBirth = document.getElementById('dateOfBirth').value;
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        const dob = new Date(dateOfBirth);
        if (Number.isNaN(dob.getTime())) {
            errorDiv.textContent = 'Ugyldig fødselsdato.';
            return;
        }

        const today = new Date();
        const minDob = new Date(today.getFullYear() - 13, today.getMonth(), today.getDate());
        if (dob > minDob) {
            errorDiv.textContent = 'Du skal være mindst 13 år for at oprette en bruger.';
            return;
        }

        try {
            const response = await fetch('/kino/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, dateOfBirth, role, password })
            });

            if (response.ok) {
                const userData = await response.json();
                localStorage.setItem('user', JSON.stringify(userData));
                window.location.href = 'index.html';
            } else {
                const message = await response.text();
                errorDiv.textContent = message || 'Fejl ved oprettelse af bruger. Prøv igen.';
            }
        } catch (error) {
            errorDiv.textContent = 'Der opstod en fejl. Prøv igen senere.';
            console.error('Registrer fejl:', error);
        }
    });

    (() => {
        const dobInput = document.getElementById('dateOfBirth');
        const today = new Date();
        const maxDob = new Date(today.getFullYear() - 13, today.getMonth(), today.getDate());
        dobInput.max = maxDob.toISOString().slice(0, 10);
    })();
</script>

</body>
</html>
